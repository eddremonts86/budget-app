version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: tanstack-template-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: If you want to run LMStudio inside docker (advanced) or another LLM service
  # For now, we assume LMStudio runs on the host machine.
