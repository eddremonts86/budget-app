services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: tanstack-template-app
    env_file:
      - .env.development
      - .env.docker
    command: ['pnpm', 'dev:server', '--host', '0.0.0.0', '--port', '3000']
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      chromadb:
        condition: service_started
      lmstudio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  chromadb:
    image: chromadb/chroma:latest
    container_name: tanstack-template-chromadb
    ports:
      - '8000:8000'
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: 'TRUE'
      ANONYMIZED_TELEMETRY: 'FALSE'

  db:
    image: postgres:15-alpine
    container_name: tanstack-template-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tanstack_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  lmstudio:
    image: lmstudio/llmster-preview:cpu
    container_name: tanstack-template-lmstudio
    platform: ${LMSTUDIO_PLATFORM:-linux/amd64}
    ports:
      - '1234:1234'
    volumes:
      - lmstudio_data:/root/.lmstudio

volumes:
  app_node_modules:
  lmstudio_data:
  postgres_data:
