services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: tanstack-template-app
    env_file:
      - .env.development
      - .env.docker
    command: ['pnpm', 'dev:server', '--host', '0.0.0.0', '--port', '3000']
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      mock:
        condition: service_healthy
      chromadb:
        condition: service_started
      lmstudio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  mock:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: tanstack-template-mock
    env_file:
      - .env.docker
    command: ['pnpm', 'dev:mock', '--host', '0.0.0.0', '--port', '3001']
    ports:
      - '3001:3001'
    volumes:
      - .:/app
      - mock_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/todos').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    container_name: tanstack-template-chromadb
    ports:
      - '8000:8000'
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: 'TRUE'
      ANONYMIZED_TELEMETRY: 'FALSE'

  lmstudio:
    image: lmstudio/llmster-preview:cpu
    container_name: tanstack-template-lmstudio
    platform: ${LMSTUDIO_PLATFORM:-linux/amd64}
    ports:
      - '1234:1234'
    volumes:
      - lmstudio_data:/root/.lmstudio

volumes:
  app_node_modules:
  mock_node_modules:
  lmstudio_data:
