services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: tanstack-template-app
    env_file:
      - .env.development
      - .env.docker
    command: ['pnpm', 'dev:server', '--host', '0.0.0.0', '--port', '3000']
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - ./ia-config:/app/ia-config:ro
      - app_node_modules:/app/node_modules
    depends_on:
      lmstudio:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  lmstudio:
    image: lmstudio/llmster-preview:cpu
    platform: linux/amd64
    container_name: tanstack-template-lmstudio
    ports:
      - '1234:1234'
    volumes:
      - lmstudio_data:/root/.cache/lm-studio/models
    healthcheck:
      test: ['CMD-SHELL', 'lms status || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    container_name: tanstack-template-chromadb
    ports:
      - '8000:8000'
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: 'TRUE'
      ANONYMIZED_TELEMETRY: 'FALSE'

  db:
    image: postgres:15-alpine
    container_name: tanstack-template-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tanstack_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: tanstack-template-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
      - ./ia-config:/etc/ia-config:ro
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    platform: linux/amd64
    container_name: tanstack-template-llama-cpp
    ports:
      - '8080:8080'
    volumes:
      - ./models:/models
      - ./ia-config:/etc/ia-config:ro
    command: -m /models/llama-3.2-1b-instruct-q4_k_m.gguf -c 2048 --host 0.0.0.0 --port 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  app_node_modules:
  lmstudio_data:
  ollama_data:
  postgres_data:
